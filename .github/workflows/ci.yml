name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  lint-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # checkout@v4 (node20), not v5: the act-based Forgejo runner that also
      # runs this workflow has no node24 runtime, which checkout@v5 requires.
      - uses: actions/checkout@v4

      - name: Install tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck zsh bats

      - name: Install tools (macOS)
        if: runner.os == 'macOS'
        run: brew install bash bats-core fzf shellcheck

      - name: Shellcheck (bash sources)
        # --severity=warning skips the SC2317 info false-positive on the
        # `return || exit` source-or-execute guard.
        run: |
          shellcheck -s bash --severity=warning \
            bin/pwdtintii \
            scripts/preview.sh \
            scripts/contrast-check.sh \
            pwdtintii.plugin.bash \
            tests/helper.bash \
            tests/run.sh

      - name: Zsh syntax check
        run: zsh -n pwdtintii.plugin.zsh

      - name: Bats suite (Linux)
        if: runner.os == 'Linux'
        run: bats tests/

      - name: Bats suite (macOS)
        if: runner.os == 'macOS'
        run: PWDTINTII_TEST_BASH="$(brew --prefix)/bin/bash" tests/run.sh

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for tag
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [[ ! -s /tmp/release-notes.md ]]; then
            echo "No changelog section found for version $VERSION" >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md
