name: Mirror to GitHub

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Add GitHub remote
        run: |
          git remote add github \
            "https://x-access-token:${{ secrets.GITHUB_MIRROR_TOKEN }}@github.com/bmmmm/pwdtintii.git"

      - name: Strip TODO.md and push main
        if: github.ref_type == 'branch'
        run: |
          git config user.email "mirror@noreply.local"
          git config user.name "Mirror"
          if git ls-files --error-unmatch TODO.md 2>/dev/null; then
            git rm --cached TODO.md
            git commit -m "chore: strip TODO for public mirror"
          fi
          git push github main --force

      - name: Mirror tags
        if: github.ref_type == 'tag'
        run: git push github "${{ github.ref }}"
